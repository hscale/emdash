  -->

  <!-- Process flow icon mark -->
  <g transform="translate(8, 12)">
    <rect x="0" y="16" width="16" height="16" rx="3" fill="#ffffff"/>
    <rect x="22" y="4" width="16" height="16" rx="3" fill="#7bc03b"/>
    <rect x="22" y="28" width="16" height="16" rx="3" fill="#ffffff" opacity="0.5"/>
    <rect x="44" y="16" width="16" height="16" rx="3" fill="#7bc03b"/>
    <line x1="16" y1="24" x2="22" y2="12" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="24" x2="22" y2="36" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="38" y1="12" x2="44" y2="24" stroke="#7bc03b" stroke-width="2" stroke-linecap="round"/>
