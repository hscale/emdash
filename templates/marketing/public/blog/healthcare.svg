<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0e1a"/>
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r=".8" fill="rgba(123,192,59,.1)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#g)"/>
  <!-- Cross symbol -->
  <rect x="565" y="180" width="70" height="170" rx="8" fill="#4f46e5" opacity=".25"/>
  <rect x="530" y="215" width="140" height="70" rx="8" fill="#4f46e5" opacity=".25"/>
  <rect x="570" y="185" width="60" height="160" rx="6" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity=".5"/>
  <rect x="535" y="220" width="130" height="60" rx="6" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity=".5"/>
  <!-- Pulse line -->
  <polyline points="200,250 350,250 400,250 430,200 460,300 490,220 520,280 530,250 670,250 700,250 730,200 760,300 790,250 1000,250" fill="none" stroke="#7bc03b" stroke-width="2" opacity=".5"/>
  <!-- Pulse dots -->
  <circle cx="200" cy="250" r="3" fill="#7bc03b" opacity=".6"/>
  <circle cx="1000" cy="250" r="3" fill="#7bc03b" opacity=".6"/>
  <!-- Glow ring -->
  <circle cx="600" cy="250" r="120" fill="none" stroke="#4f46e5" stroke-width="1" opacity=".15"/>
  <circle cx="600" cy="250" r="140" fill="none" stroke="#7bc03b" stroke-width=".5" opacity=".1"/>
  <!-- Category label -->
  <text x="600" y="420" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="48" font-weight="800" letter-spacing="-1">HEALTHCARE</text>
  <text x="600" y="460" text-anchor="middle" fill="rgba(226,232,240,.4)" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="400">Clinical Workflows &amp; Patient Care</text>
  <!-- Brand -->
  <text x="600" y="580" text-anchor="middle" fill="rgba(123,192,59,.4)" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" letter-spacing="2">ISO BPMS</text>
</svg>