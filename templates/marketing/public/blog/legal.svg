<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0e1a"/>
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r=".8" fill="rgba(123,192,59,.1)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#g)"/>
  <!-- Document layers (stacked) -->
  <rect x="510" y="210" width="180" height="220" rx="6" fill="#132f5e" opacity=".3"/>
  <rect x="510" y="210" width="180" height="220" rx="6" fill="none" stroke="#4f46e5" stroke-width="1" opacity=".2"/>
  <rect x="490" y="190" width="180" height="220" rx="6" fill="#132f5e" opacity=".4"/>
  <rect x="490" y="190" width="180" height="220" rx="6" fill="none" stroke="#4f46e5" stroke-width="1" opacity=".3"/>
  <rect x="470" y="170" width="180" height="220" rx="6" fill="#0a0e1a"/>
  <rect x="470" y="170" width="180" height="220" rx="6" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity=".5"/>
  <!-- Document lines -->
  <line x1="500" y1="210" x2="620" y2="210" stroke="rgba(226,232,240,.15)" stroke-width="1.5"/>
  <line x1="500" y1="235" x2="600" y2="235" stroke="rgba(226,232,240,.1)" stroke-width="1.5"/>
  <line x1="500" y1="260" x2="620" y2="260" stroke="rgba(226,232,240,.1)" stroke-width="1.5"/>
  <line x1="500" y1="285" x2="580" y2="285" stroke="rgba(226,232,240,.08)" stroke-width="1.5"/>
  <line x1="500" y1="310" x2="610" y2="310" stroke="rgba(226,232,240,.08)" stroke-width="1.5"/>
  <!-- Checkmark -->
  <circle cx="680" cy="180" r="24" fill="#7bc03b" opacity=".15"/>
  <circle cx="680" cy="180" r="24" fill="none" stroke="#7bc03b" stroke-width="2" opacity=".5"/>
  <polyline points="668,180 676,190 694,170" fill="none" stroke="#7bc03b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
  <!-- Second checkmark (smaller, offset) -->
  <circle cx="710" cy="350" r="18" fill="#7bc03b" opacity=".1"/>
  <circle cx="710" cy="350" r="18" fill="none" stroke="#7bc03b" stroke-width="1.5" opacity=".35"/>
  <polyline points="700,350 707,358 722,342" fill="none" stroke="#7bc03b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/>
  <!-- Category label -->
  <text x="600" y="440" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="48" font-weight="800" letter-spacing="-1">LEGAL</text>
  <text x="600" y="480" text-anchor="middle" fill="rgba(226,232,240,.4)" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="400">Contract Management &amp; Compliance</text>
  <!-- Brand -->
  <text x="600" y="580" text-anchor="middle" fill="rgba(123,192,59,.4)" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" letter-spacing="2">ISO BPMS</text>
</svg>