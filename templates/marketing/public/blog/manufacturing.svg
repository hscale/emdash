<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0e1a"/>
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r=".8" fill="rgba(123,192,59,.1)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#g)"/>
  <!-- Gear 1 -->
  <circle cx="420" cy="260" r="80" fill="none" stroke="#4f46e5" stroke-width="2" opacity=".6"/>
  <circle cx="420" cy="260" r="55" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity=".4"/>
  <circle cx="420" cy="260" r="20" fill="#4f46e5" opacity=".3"/>
  <!-- Gear teeth 1 -->
  <rect x="415" y="175" width="10" height="20" fill="#4f46e5" opacity=".5" rx="2"/>
  <rect x="415" y="325" width="10" height="20" fill="#4f46e5" opacity=".5" rx="2"/>
  <rect x="335" y="255" width="20" height="10" fill="#4f46e5" opacity=".5" rx="2"/>
  <rect x="485" y="255" width="20" height="10" fill="#4f46e5" opacity=".5" rx="2"/>
  <!-- Gear 2 -->
  <circle cx="580" cy="220" r="50" fill="none" stroke="#7bc03b" stroke-width="2" opacity=".6"/>
  <circle cx="580" cy="220" r="30" fill="none" stroke="#7bc03b" stroke-width="1.5" opacity=".4"/>
  <circle cx="580" cy="220" r="12" fill="#7bc03b" opacity=".3"/>
  <!-- Gear teeth 2 -->
  <rect x="575" y="165" width="10" height="15" fill="#7bc03b" opacity=".5" rx="2"/>
  <rect x="575" y="260" width="10" height="15" fill="#7bc03b" opacity=".5" rx="2"/>
  <rect x="525" y="215" width="15" height="10" fill="#7bc03b" opacity=".5" rx="2"/>
  <rect x="620" y="215" width="15" height="10" fill="#7bc03b" opacity=".5" rx="2"/>
  <!-- Gear 3 -->
  <circle cx="750" cy="270" r="65" fill="none" stroke="#4f46e5" stroke-width="2" opacity=".4"/>
  <circle cx="750" cy="270" r="42" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity=".3"/>
  <circle cx="750" cy="270" r="16" fill="#4f46e5" opacity=".2"/>
  <!-- Circuit lines -->
  <line x1="200" y1="260" x2="340" y2="260" stroke="#7bc03b" stroke-width="1" opacity=".3"/>
  <line x1="500" y1="260" x2="700" y2="270" stroke="#7bc03b" stroke-width="1" opacity=".3"/>
  <line x1="815" y1="270" x2="1000" y2="270" stroke="#7bc03b" stroke-width="1" opacity=".3"/>
  <circle cx="200" cy="260" r="3" fill="#7bc03b" opacity=".5"/>
  <circle cx="1000" cy="270" r="3" fill="#7bc03b" opacity=".5"/>
  <!-- Category label -->
  <text x="600" y="420" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="48" font-weight="800" letter-spacing="-1">MANUFACTURING</text>
  <!-- Subtitle -->
  <text x="600" y="460" text-anchor="middle" fill="rgba(226,232,240,.4)" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="400">Process Automation &amp; Industry 4.0</text>
  <!-- Brand -->
  <text x="600" y="580" text-anchor="middle" fill="rgba(123,192,59,.4)" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" letter-spacing="2">ISO BPMS</text>
</svg>