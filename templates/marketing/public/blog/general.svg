<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0e1a"/>
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r=".8" fill="rgba(123,192,59,.1)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#g)"/>
  <!-- Workflow diagram - start node -->
  <circle cx="280" cy="240" r="18" fill="#7bc03b" opacity=".3"/>
  <circle cx="280" cy="240" r="18" fill="none" stroke="#7bc03b" stroke-width="2" opacity=".6"/>
  <circle cx="280" cy="240" r="6" fill="#7bc03b" opacity=".5"/>
  <!-- Process node 1 -->
  <rect x="400" y="215" width="80" height="50" rx="8" fill="#4f46e5" opacity=".2"/>
  <rect x="400" y="215" width="80" height="50" rx="8" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity=".5"/>
  <!-- Diamond decision -->
  <rect x="570" y="215" width="50" height="50" rx="4" fill="#7bc03b" opacity=".15" transform="rotate(45,595,240)"/>
  <rect x="570" y="215" width="50" height="50" rx="4" fill="none" stroke="#7bc03b" stroke-width="1.5" opacity=".45" transform="rotate(45,595,240)"/>
  <!-- Process node 2 (top branch) -->
  <rect x="700" y="170" width="70" height="40" rx="6" fill="#4f46e5" opacity=".2"/>
  <rect x="700" y="170" width="70" height="40" rx="6" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity=".4"/>
  <!-- Process node 3 (bottom branch) -->
  <rect x="700" y="280" width="70" height="40" rx="6" fill="#4f46e5" opacity=".2"/>
  <rect x="700" y="280" width="70" height="40" rx="6" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity=".4"/>
  <!-- End node -->
  <circle cx="900" cy="240" r="18" fill="#7bc03b" opacity=".3"/>
  <circle cx="900" cy="240" r="18" fill="none" stroke="#7bc03b" stroke-width="2" opacity=".6"/>
  <circle cx="900" cy="240" r="12" fill="none" stroke="#7bc03b" stroke-width="1.5" opacity=".4"/>
  <!-- Flow arrows -->
  <line x1="298" y1="240" x2="400" y2="240" stroke="#7bc03b" stroke-width="1.5" opacity=".4"/>
  <line x1="480" y1="240" x2="565" y2="240" stroke="#4f46e5" stroke-width="1.5" opacity=".35"/>
  <line x1="625" y1="215" x2="700" y2="190" stroke="#7bc03b" stroke-width="1.5" opacity=".35"/>
  <line x1="625" y1="265" x2="700" y2="300" stroke="#7bc03b" stroke-width="1.5" opacity=".35"/>
  <line x1="770" y1="190" x2="882" y2="235" stroke="#4f46e5" stroke-width="1.5" opacity=".3"/>
  <line x1="770" y1="300" x2="882" y2="245" stroke="#4f46e5" stroke-width="1.5" opacity=".3"/>
  <!-- Arrow heads (small triangles) -->
  <polygon points="397,236 397,244 405,240" fill="#7bc03b" opacity=".5"/>
  <polygon points="879,232 879,240 887,236" fill="#4f46e5" opacity=".4"/>
  <!-- Category label -->
  <text x="600" y="420" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="48" font-weight="800" letter-spacing="-1">BUSINESS PROCESSES</text>
  <text x="600" y="460" text-anchor="middle" fill="rgba(226,232,240,.4)" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="400">Workflow Automation &amp; Optimization</text>
  <!-- Brand -->
  <text x="600" y="580" text-anchor="middle" fill="rgba(123,192,59,.4)" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" letter-spacing="2">ISO BPMS</text>
</svg>