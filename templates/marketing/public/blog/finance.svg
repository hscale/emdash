  <circle cx="340" cy="295" r="3" fill="#7bc03b" opacity=".7"/>
  <circle cx="520" cy="215" r="3" fill="#7bc03b" opacity=".7"/>
  <circle cx="640" cy="195" r="3" fill="#7bc03b" opacity=".7"/>
  <circle cx="820" cy="155" r="3" fill="#7bc03b" opacity=".7"/>
  <!-- Baseline -->
  <line x1="300" y1="360" x2="860" y2="360" stroke="rgba(226,232,240,.15)" stroke-width="1"/>
  <!-- Category label -->
  <text x="600" y="420" text-anchor="middle" fill="#e2e8f0" font-family="Inter,system-ui,sans-serif" font-size="48" font-weight="800" letter-spacing="-1">FINANCE</text>
  <text x="600" y="460" text-anchor="middle" fill="rgba(226,232,240,.4)" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="400">Financial Operations &amp; Compliance</text>
