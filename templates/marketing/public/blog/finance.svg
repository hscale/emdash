  <rect x="800" y="160" width="40" height="200" rx="3" fill="#7bc03b" opacity=".7"/>
  <!-- Trend line -->
  <polyline points="340,295 400,265 460,235 520,215 580,255 640,195 700,225 760,175 820,155" fill="none" stroke="#7bc03b" stroke-width="2" opacity=".6"/>
