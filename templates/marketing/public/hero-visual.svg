<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <style>
    @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
    @keyframes dash { to { stroke-dashoffset: 0 } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
    @keyframes glow { 0%,100% { filter: drop-shadow(0 0 6px rgba(123,192,59,.3)) } 50% { filter: drop-shadow(0 0 16px rgba(123,192,59,.6)) } }
    @keyframes scan { from { transform: translateY(-100%) } to { transform: translateY(400%) } }
    .node { animation: fadeUp .5s ease both }
    .n1 { animation-delay:.1s } .n2 { animation-delay:.25s } .n3 { animation-delay:.4s }
    .n4 { animation-delay:.35s } .n5 { animation-delay:.5s } .n6 { animation-delay:.6s }
    .connector { stroke-dasharray: 200; stroke-dashoffset: 200; animation: dash .8s ease forwards }
    .c1 { animation-delay:.3s } .c2 { animation-delay:.45s } .c3 { animation-delay:.55s }
    .c4 { animation-delay:.65s } .c5 { animation-delay:.7s } .c6 { animation-delay:.8s }
    .dot { animation: pulse 2s ease-in-out infinite }
    .d1 { animation-delay:0s } .d2 { animation-delay:.5s } .d3 { animation-delay:1s }
    .glowing { animation: glow 3s ease-in-out infinite }
  </style>

  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r=".8" fill="rgba(123,192,59,.15)"/>
    </pattern>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7bc03b" stop-opacity=".6"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity=".6"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7bc03b"/>
      <stop offset="1" stop-color="#5fa82a"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="500" fill="url(#grid)"/>

  <!-- Ambient glow spots -->
  <circle cx="150" cy="160" r="80" fill="rgba(123,192,59,.04)" filter="url(#glowFilter)"/>
  <circle cx="450" cy="160" r="80" fill="rgba(79,70,229,.04)" filter="url(#glowFilter)"/>
  <circle cx="300" cy="340" r="60" fill="rgba(123,192,59,.03)" filter="url(#glowFilter)"/>

  <!-- Connection lines with gradient -->
  <g stroke-width="1.5" stroke-linecap="round">
    <line x1="200" y1="160" x2="255" y2="120" stroke="url(#lineGrad)" class="connector c1"/>
    <line x1="200" y1="160" x2="255" y2="200" stroke="url(#lineGrad)" class="connector c2"/>
    <line x1="355" y1="120" x2="410" y2="160" stroke="url(#lineGrad)" class="connector c3"/>
    <line x1="355" y1="200" x2="410" y2="160" stroke="url(#lineGrad)" class="connector c4"/>
    <line x1="200" y1="340" x2="255" y2="300" stroke="url(#lineGrad)" class="connector c5"/>
    <line x1="355" y1="300" x2="410" y2="340" stroke="url(#lineGrad)" class="connector c6"/>
  </g>

  <!-- Animated flow particles -->
  <g class="glowing">
    <circle r="3" fill="#7bc03b">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M200 160 L255 120 L355 120 L410 160"/>
    </circle>
    <circle r="3" fill="#7bc03b">
      <animateMotion dur="3s" repeatCount="indefinite" path="M200 160 L255 200 L355 200 L410 160"/>
    </circle>
    <circle r="2.5" fill="#4f46e5">
      <animateMotion dur="2.8s" repeatCount="indefinite" path="M200 340 L255 300 L355 300 L410 340"/>
    </circle>
  </g>

  <!-- === TOP FLOW === -->
  <!-- Trigger node (pill shape) -->
  <g class="node n1">
    <rect x="110" y="138" width="90" height="44" rx="22" fill="url(#nodeGrad1)" opacity=".9"/>
    <rect x="110" y="138" width="90" height="44" rx="22" fill="none" stroke="#7bc03b" stroke-width=".5" opacity=".5"/>
    <text x="155" y="165" text-anchor="middle" fill="#0a0e1a" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">Trigger</text>
  </g>

  <!-- Condition node -->
  <g class="node n2">
    <rect x="250" y="98" width="110" height="44" rx="6" fill="rgba(123,192,59,.08)" stroke="rgba(123,192,59,.4)" stroke-width="1"/>
    <text x="305" y="116" text-anchor="middle" fill="#7bc03b" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Condition</text>
    <text x="305" y="131" text-anchor="middle" fill="rgba(255,255,255,.4)" font-family="Inter,system-ui,sans-serif" font-size="9">amount &gt; $1,000</text>
  </g>

  <!-- Approval node -->
  <g class="node n3">
    <rect x="250" y="178" width="110" height="44" rx="6" fill="rgba(79,70,229,.08)" stroke="rgba(79,70,229,.4)" stroke-width="1"/>
    <text x="305" y="196" text-anchor="middle" fill="#818cf8" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Approval</text>
    <text x="305" y="211" text-anchor="middle" fill="rgba(255,255,255,.4)" font-family="Inter,system-ui,sans-serif" font-size="9">manager review</text>
  </g>

  <!-- Action node -->
  <g class="node n4">
    <rect x="405" y="138" width="100" height="44" rx="6" fill="url(#nodeGrad2)" opacity=".9"/>
    <rect x="405" y="138" width="100" height="44" rx="6" fill="none" stroke="#4f46e5" stroke-width=".5" opacity=".5"/>
    <text x="455" y="157" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Send Email</text>
    <text x="455" y="171" text-anchor="middle" fill="rgba(255,255,255,.5)" font-family="Inter,system-ui,sans-serif" font-size="9">notify team</text>
  </g>

  <!-- === BOTTOM FLOW === -->
  <!-- Schedule trigger -->
  <g class="node n1">
    <rect x="110" y="318" width="90" height="44" rx="22" fill="url(#nodeGrad2)" opacity=".9"/>
    <rect x="110" y="318" width="90" height="44" rx="22" fill="none" stroke="#4f46e5" stroke-width=".5" opacity=".5"/>
    <text x="155" y="345" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">Schedule</text>
  </g>

  <!-- Transform node -->
  <g class="node n5">
    <rect x="250" y="278" width="110" height="44" rx="6" fill="rgba(123,192,59,.08)" stroke="rgba(123,192,59,.4)" stroke-width="1"/>
    <text x="305" y="296" text-anchor="middle" fill="#7bc03b" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Transform</text>
    <text x="305" y="311" text-anchor="middle" fill="rgba(255,255,255,.4)" font-family="Inter,system-ui,sans-serif" font-size="9">aggregate data</text>
  </g>

  <!-- Create Record -->
  <g class="node n6">
    <rect x="405" y="318" width="100" height="44" rx="6" fill="url(#nodeGrad1)" opacity=".9"/>
    <rect x="405" y="318" width="100" height="44" rx="6" fill="none" stroke="#7bc03b" stroke-width=".5" opacity=".5"/>
    <text x="455" y="337" text-anchor="middle" fill="#0a0e1a" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Create Record</text>
    <text x="455" y="351" text-anchor="middle" fill="rgba(0,0,0,.5)" font-family="Inter,system-ui,sans-serif" font-size="9">save report</text>
  </g>

  <!-- AI Badge with glow -->
  <g class="node n6">
    <rect x="185" y="405" width="230" height="38" rx="19" fill="rgba(123,192,59,.06)" stroke="rgba(123,192,59,.25)" stroke-width="1"/>
    <circle cx="210" cy="424" r="6" fill="rgba(123,192,59,.2)" class="dot d1"/>
    <circle cx="210" cy="424" r="3" fill="#7bc03b" class="dot d2"/>
    <text x="300" y="429" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="400" letter-spacing=".5">
      <tspan fill="#7bc03b" font-weight="700">AI</tspan>
      <tspan fill="rgba(255,255,255,.6)"> designed this workflow</tspan>
    </text>
  </g>

  <!-- Decorative corner accents -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="rgba(123,192,59,.2)" stroke-width="1"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="rgba(123,192,59,.2)" stroke-width="1"/>
  <line x1="580" y1="480" x2="540" y2="480" stroke="rgba(79,70,229,.2)" stroke-width="1"/>
  <line x1="580" y1="480" x2="580" y2="440" stroke="rgba(79,70,229,.2)" stroke-width="1"/>
</svg>
